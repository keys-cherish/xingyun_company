services:
  postgres:
    image: postgres:16-alpine
    container_name: my_company_postgres
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mycompany}
      POSTGRES_USER: ${POSTGRES_USER:-mycompany}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mycompany}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: my_company_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-mycompany_redis} --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: always
    volumes:
      - ./redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  bot:
    build: .
    container_name: my_company_bot
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-mycompany_redis}@my_company_redis:6379/0
    ports:
      - "127.0.0.1:${WEBHOOK_PORT:-8080}:${WEBHOOK_PORT:-8080}"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    networks:
      - default
      - dice_shared
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  api:
    build: .
    container_name: my_company_api
    command: uv run python -m api
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-mycompany_redis}@my_company_redis:6379/0
    ports:
      - "${API_PORT:-8090}:${API_PORT:-8090}"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    networks:
      - default
      - dice_shared
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  dice_shared:
    external: true
    name: dice_bot_default
